<div class="mainContainer">
    <p class="hero-label">Nueva entrada</p>
    <div class="title">Agregar a mi Closet</div>
    <p class="subtitle">Completa los detalles para incluir una nueva prenda en tu closet.</p>
    <div class="divider"></div>
    <div class="formContainer">
        <form>
        <div class="label">
            <label for="garmentName">Nombre de la prenda:</label>
            <input class="inputField" id="garmentName" name="garmentName" required>
        </div>
        <div class="label">
            <label for="garmentType">Tipo de prenda:</label>
            <input class="inputField" type="text" id="garmentType" name="garmentType" required>
        </div>
        <div class="label">
            <label for="garmentColor">Color:</label>
            <input class="inputField" type="text" id="garmentColor" name="garmentColor" required>
        </div>
        <div class="label" id="region">
            <label for="garmentSize">Talla:</label>
            <select class="inputField" required>
                @for (size of sizes; track size) {
                    <option [value]="size">
                        {{ size }}
                    </option>
                }
            </select>
        </div>
        <div class="label">
            <label for="garmentImage">Imagen (URL):</label>
            <input class="inputField" type="text" id="garmentImage" name="garmentImage" required>
        </div>
        <button class="button" type="submit">Agregar a mi Closet</button>
    </form>
    </div>
</div>
