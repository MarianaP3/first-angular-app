<div class="mainContainer">
    <p class="hero-label">Nueva entrada</p>
    <div class="title">Agregar a mi Closet</div>
    <p class="subtitle">Completa los detalles para incluir una nueva prenda en tu closet.</p>
    <div class="divider"></div>
    <div class="formContainer">
        <form>
        <div class="label">
            <label for="countryName">Nombre de la prenda:</label>
            <input class="inputField" id="countryName" name="countryName" required>
        </div>
        <div class="label">
            <label for="countryCode">Tipo de prenda:</label>
            <input class="inputField" type="text" id="capital" name="capital" required>
        </div>
        <div class="label">
            <label for="population">Color:</label>
            <input class="inputField" type="text" id="population" name="population" required>
        </div>
        <div class="label" id="region">
            <label for="region">Talla:</label>
            <select class="inputField" required>
                @for (size of sizes; track size) {
                    <option [value]="size">
                        {{ size }}
                    </option>
                }
            </select>
        </div>
        <div class="label">
            <label for="flagUrl">Imagen (URL):</label>
            <input class="inputField" type="text" id="flagUrl" name="flagUrl" required>
        </div>
        <button class="button" type="submit">Agregar a la colección</button>
    </form>
    </div>
</div>
